<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - SleepCare Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        h2 {
            color: #333;
        }
        button {
            background: #C76134;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 5px 5px 0;
        }
        button:hover {
            background: #a84a2a;
        }
        pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        .info {
            color: blue;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔍 Debug - SleepCare Login</h2>

    <h3>1. Verificar localStorage</h3>
    <button onclick="checkStorage()">Verificar Contas</button>
    <pre id="storageOutput"></pre>

    <h3>2. Limpar localStorage</h3>
    <button onclick="clearStorage()">Limpar Tudo</button>
    <p id="clearOutput"></p>

    <h3>3. Criar Contas Manualmente</h3>
    <button onclick="createAccounts()">Criar Contas</button>
    <p id="createOutput"></p>

    <h3>4. Testar Login</h3>
    <input type="email" id="testEmail" placeholder="Email" value="nataliavogt@outlook.com">
    <input type="password" id="testPassword" placeholder="Senha" value="Crm53990.">
    <button onclick="testLogin()">Testar Login</button>
    <p id="loginOutput"></p>

    <h3>5. Ir para Plataforma</h3>
    <button onclick="window.location.href='sleepcare_questionnaire_platform.html'">
        ➜ Abrir Plataforma
    </button>
</div>

<script>
function checkStorage() {
    const patients = JSON.parse(localStorage.getItem('sleepcare_patients') || '[]');
    const output = document.getElementById('storageOutput');

    if (patients.length === 0) {
        output.innerHTML = '<span class="error">❌ Nenhuma conta encontrada!</span>';
    } else {
        output.innerHTML = '<span class="success">✅ Contas encontradas:</span>\n\n';
        patients.forEach((p, i) => {
            output.innerHTML += `${i+1}. ${p.name}\n   Email: ${p.email}\n   Senha: ${p.password}\n\n`;
        });
    }
}

function clearStorage() {
    localStorage.clear();
    document.getElementById('clearOutput').innerHTML =
        '<span class="success">✅ localStorage limpo!</span><br>' +
        'Atualize a página agora (F5).';
}

function createAccounts() {
    const accounts = [
        {
            id: 'admin-001',
            name: 'Dra. Natália Vogt',
            email: 'nataliavogt@outlook.com',
            phone: '(11) 99999-9999',
            cpf: '12345678901',
            password: 'Crm53990.',
            createdAt: new Date().toISOString(),
            lgpdConsent: true,
            lgpdConsentDate: new Date().toISOString(),
            questionnaires: {
                stopBang: { completed: false, score: null, date: null, responses: [] },
                psqi: { completed: false, score: null, date: null, responses: [] },
                isi: { completed: false, score: null, date: null, responses: [] },
                epworth: { completed: false, score: null, date: null, responses: [] }
            }
        },
        {
            id: 'test-001',
            name: 'Teste',
            email: 'teste@sleepcare.com',
            phone: '(11) 98765-4321',
            cpf: '12345678909',
            password: 'teste123',
            createdAt: new Date().toISOString(),
            lgpdConsent: true,
            lgpdConsentDate: new Date().toISOString(),
            questionnaires: {
                stopBang: { completed: false, score: null, date: null, responses: [] },
                psqi: { completed: false, score: null, date: null, responses: [] },
                isi: { completed: false, score: null, date: null, responses: [] },
                epworth: { completed: false, score: null, date: null, responses: [] }
            }
        }
    ];

    localStorage.setItem('sleepcare_patients', JSON.stringify(accounts));
    document.getElementById('createOutput').innerHTML =
        '<span class="success">✅ Contas criadas! Agora teste o login abaixo ou vá para a plataforma.</span>';

    checkStorage();
}

function testLogin() {
    const email = document.getElementById('testEmail').value;
    const password = document.getElementById('testPassword').value;
    const output = document.getElementById('loginOutput');

    if (!email || !password) {
        output.innerHTML = '<span class="error">❌ Preencha email e senha</span>';
        return;
    }

    const patients = JSON.parse(localStorage.getItem('sleepcare_patients') || '[]');
    const patient = patients.find(p => p.email === email);

    if (!patient) {
        output.innerHTML = '<span class="error">❌ Email não encontrado</span>';
        return;
    }

    if (patient.password !== password) {
        output.innerHTML = '<span class="error">❌ Senha incorreta</span>';
        return;
    }

    output.innerHTML = '<span class="success">✅ Login OK! Você pode entrar agora.</span><br>' +
        'Nome: ' + patient.name;
}

// Auto-run on load
window.addEventListener('load', function() {
    checkStorage();
    createAccounts();
});
</script>

</body>
</html>
